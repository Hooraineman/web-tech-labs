<!DOCTYPE html>
<html>
<head>
    <title>Card Component Design</title>
    <link rel="stylesheet" href="../styles/main.css">
    <link rel="stylesheet" href="../styles/components.css">
</head>
<body>
<h1>Product Cards</h1>
<div class="card-container">

    <div class="card">
        <img src="../images/gallery/img1.jpg" alt="Product">
        <h3>Web Design</h3>
        <p>Professional modern website design services.</p>
        <button class="btn primary">Learn More</button>
    </div>
    <div class="card">
        <img src="../images/gallery/img2.jpg" alt="Product">
        <h3>App Development</h3>
        <p>Build powerful mobile applications.</p>
        <button class="btn success">Learn More</button>
    </div>
    <div class="card">
        <img src="../images/gallery/img3.jpg" alt="Product">
        <h3>SEO Optimization</h3>
        <p>Improve search ranking and website traffic.</p>
        <button class="btn danger">Learn More</button>
    </div>
</div>
</body>
</html>
