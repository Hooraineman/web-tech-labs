<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CSS Selectors</title>
    <link rel="stylesheet" href="../styles/main.css">
    <link rel="stylesheet" href="../styles/components.css">
</head>
<body>

<h1>CSS Selectors Demo</h1>

<p>This is a normal paragraph (element selector)</p>

<p class="intro">This paragraph uses a class selector</p>

<p id="special">This paragraph uses an ID selector</p>

<div>
    <p>Paragraph inside a div (descendant combinator)</p>
</div>

<input type="text" placeholder="Text input (attribute selector)">
<input type="password" placeholder="Password (attribute selector)">

<ul>
    <li>Item 1</li>
    <li>Item 2</li>
    <li>Item 3</li>
</ul>

<a href="#">Hover over this link (pseudo-class)</a>

</body>
</html>
